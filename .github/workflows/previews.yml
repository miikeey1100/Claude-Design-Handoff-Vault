name: Regenerate Previews

on:
  push:
    branches: [main]
    paths:
      - 'bundles/**/project/**'
      - 'manifest.json'
  pull_request:
    paths:
      - 'bundles/**/project/**'
      - 'manifest.json'
  workflow_dispatch:

jobs:
  capture:
    name: Capture & Compare Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Capture base previews
        run: npm run capture

      - name: Capture fidelity comparison previews
        run: npm run compare

      - name: Upload previews as artifact
        uses: actions/upload-artifact@v4
        with:
          name: previews-${{ github.run_number }}
          path: previews/
          retention-days: 14
