name: Regenerate Previews

on:
  push:
    branches: [main]
    paths:
      - 'bundles/**/project/**'
      - 'manifest.json'
  pull_request:
    paths:
      - 'bundles/**/project/**'
      - 'manifest.json'
  workflow_dispatch:

jobs:
  capture:
    name: Capture & Compare Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Capture base previews
        run: npm run capture

      - name: Capture fidelity comparison previews
        run: npm run compare

      - name: Commit updated previews
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add previews/
          git diff --staged --quiet || git commit -m "ci: regenerate previews [skip ci]"
          git push

      - name: Upload previews as artifact (on PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: previews-pr-${{ github.event.pull_request.number }}
          path: previews/
          retention-days: 14
