const GlassPanel = ({ children, style = {}, tilt = false, blur = 28, intensity = 1, ...rest }) => {
  const ref = React.useRef(null);
  const [tilts, setTilts] = React.useState({ rx: 0, ry: 0, mx: 50, my: 50 });

  const onMove = (e) => {
    if (!tilt) return;
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top) / r.height;
    setTilts({
      rx: (0.5 - y) * 4,
      ry: (x - 0.5) * 4,
      mx: x * 100,
      my: y * 100,
    });
  };
  const onLeave = () => setTilts({ rx: 0, ry: 0, mx: 50, my: 50 });

  return (
    <div
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      style={{
        position: 'relative',
        borderRadius: 22,
        background: `
          radial-gradient(120% 120% at ${tilts.mx}% ${tilts.my}%, rgba(255,255,255,${0.10 * intensity}) 0%, rgba(255,255,255,0) 45%),
          linear-gradient(145deg, rgba(255,255,255,${0.09 * intensity}) 0%, rgba(255,255,255,0.02) 40%, rgba(255,255,255,${0.05 * intensity}) 100%)
        `,
        backdropFilter: `blur(${blur}px) saturate(1.6)`,
        WebkitBackdropFilter: `blur(${blur}px) saturate(1.6)`,
        border: '1px solid rgba(255,255,255,0.14)',
        boxShadow: `
          0 1px 0 0 rgba(255,255,255,0.22) inset,
          0 -1px 0 0 rgba(255,255,255,0.05) inset,
          0 30px 60px -20px rgba(0,0,0,0.55),
          0 10px 30px -12px rgba(120, 80, 255, 0.25)
        `,
        transform: `perspective(1200px) rotateX(${tilts.rx}deg) rotateY(${tilts.ry}deg)`,
        transition: 'transform 320ms cubic-bezier(.2,.8,.2,1)',
        ...style,
      }}
      {...rest}
    >
      {/* top specular highlight */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 'inherit', pointerEvents: 'none',
        background: 'linear-gradient(180deg, rgba(255,255,255,0.18), transparent 25%)',
        mixBlendMode: 'overlay', opacity: 0.7,
      }} />
      {/* holographic chromatic edge */}
      <div style={{
        position: 'absolute', inset: -1, borderRadius: 'inherit', pointerEvents: 'none',
        padding: 1,
        background: 'conic-gradient(from 140deg at 50% 50%, rgba(120,220,255,0.55), rgba(200,120,255,0.45), rgba(255,120,200,0.4), rgba(120,255,220,0.45), rgba(120,220,255,0.55))',
        WebkitMask: 'linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0)',
        WebkitMaskComposite: 'xor',
        maskComposite: 'exclude',
        opacity: 0.35,
      }} />
      {children}
    </div>
  );
};

// Iridescent button — press and hover states, optional shimmer
const HoloButton = ({ children, variant = 'primary', onClick, style = {}, icon, full = false }) => {
  const [hover, setHover] = React.useState(false);
  const [press, setPress] = React.useState(false);

  const bg = {
    primary: `linear-gradient(135deg,
      oklch(0.72 0.18 220) 0%,
      oklch(0.70 0.22 300) 45%,
      oklch(0.75 0.20 340) 100%)`,
    ghost: 'rgba(255,255,255,0.06)',
    risk: `linear-gradient(135deg,
      var(--risk-a) 0%, var(--risk-b) 100%)`,
  }[variant];

  return (
    <button
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setPress(false); }}
      onMouseDown={() => setPress(true)}
      onMouseUp={() => setPress(false)}
      style={{
        position: 'relative',
        width: full ? '100%' : 'auto',
        padding: '14px 22px',
        borderRadius: 16,
        border: '1px solid rgba(255,255,255,0.18)',
        background: bg,
        color: variant === 'ghost' ? 'rgba(255,255,255,0.9)' : '#0b0620',
        fontFamily: 'Space Grotesk, sans-serif',
        fontSize: 15,
        fontWeight: 600,
        letterSpacing: 0.2,
        cursor: 'pointer',
        overflow: 'hidden',
        transform: press ? 'translateY(1px) scale(0.985)' : hover ? 'translateY(-1px)' : 'translateY(0)',
        boxShadow: press
          ? '0 4px 12px -4px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.3) inset'
          : hover
            ? '0 16px 40px -10px rgba(180,120,255,0.55), 0 1px 0 rgba(255,255,255,0.4) inset'
            : '0 8px 24px -8px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.3) inset',
        transition: 'transform 180ms cubic-bezier(.2,.8,.2,1), box-shadow 240ms',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        ...style,
      }}
    >
      {/* shimmer sweep on hover */}
      <span style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.45) 50%, transparent 70%)',
        transform: `translateX(${hover ? '120%' : '-120%'})`,
        transition: 'transform 900ms cubic-bezier(.2,.8,.2,1)',
        pointerEvents: 'none',
      }} />
      {icon && <span style={{ display: 'inline-flex' }}>{icon}</span>}
      <span style={{ position: 'relative' }}>{children}</span>
    </button>
  );
};

// Mini sparkline
const Sparkline = ({ data, stroke = 'rgba(255,255,255,0.7)', w = 88, h = 28 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

// ---- Asset list with search ----------------------------------------------
const AssetList = ({ query, setQuery }) => {
  // fuzzy scoring — simple subsequence match with proximity bonus
  const score = (needle, hay) => {
    if (!needle) return 0;
    needle = needle.toLowerCase(); hay = hay.toLowerCase();
    let ni = 0, lastMatch = -1, s = 0;
    for (let i = 0; i < hay.length && ni < needle.length; i++) {
      if (hay[i] === needle[ni]) {
        s += 10;
        if (lastMatch >= 0 && i - lastMatch === 1) s += 6; // consecutive
        if (i === 0) s += 4;
        lastMatch = i; ni++;
      }
    }
    return ni === needle.length ? s : -1;
  };

  const filtered = React.useMemo(() => {
    if (!query) return ASSETS;
    return ASSETS.map(a => ({
      a,
      s: Math.max(score(query, a.sym), score(query, a.name)),
    })).filter(x => x.s > 0).sort((x, y) => y.s - x.s).map(x => x.a);
  }, [query]);

  const highlight = (text) => {
    if (!query) return text;
    const q = query.toLowerCase();
    const out = [];
    let qi = 0;
    for (let i = 0; i < text.length; i++) {

  const chroma = 0.17 + risk * 0.06;
  const riskA = `oklch(0.78 ${chroma} ${hue})`;
  const riskB = `oklch(0.65 ${chroma + 0.03} ${hue - 20})`;

  const total = ASSETS.reduce((s, a) => s + a.balance * a.price, 0);

  return (
    <div
      style={{
        '--risk-a': riskA,
        '--risk-b': riskB,
        position: 'relative',
        minHeight: '100vh',
        padding: '28px 36px 56px',
        color: '#fff',
        fontFamily: 'Space Grotesk, sans-serif',
        overflow: 'hidden',
        isolation: 'isolate',
      }}
    >
      {/* Cosmos background */}
      <div style={{
        position: 'fixed', inset: 0, zIndex: -2,
        background: 'radial-gradient(130% 100% at 70% -10%, oklch(0.28 0.12 300) 0%, oklch(0.14 0.06 270) 40%, oklch(0.09 0.04 260) 100%)',
      }}/>
      {/* Aurora blobs */}
      <div style={{
        position: 'fixed', width: 720, height: 720, borderRadius: '50%',
        top: -180, left: -140, zIndex: -1, pointerEvents: 'none',
        background: `radial-gradient(circle, ${riskA}aa 0%, transparent 60%)`,
        filter: 'blur(90px)', opacity: 0.45,
        transition: 'background 400ms',
      }}/>
      <div style={{
        position: 'fixed', width: 640, height: 640, borderRadius: '50%',
        bottom: -160, right: -120, zIndex: -1, pointerEvents: 'none',
        background: 'radial-gradient(circle, oklch(0.6 0.22 310 / 0.7) 0%, transparent 60%)',
        filter: 'blur(90px)', opacity: 0.6,
      }}/>
      <div style={{
        position: 'fixed', width: 520, height: 520, borderRadius: '50%',
        top: '45%', left: '42%', zIndex: -1, pointerEvents: 'none',
        background: 'radial-gradient(circle, oklch(0.6 0.22 220 / 0.5) 0%, transparent 60%)',
        filter: 'blur(100px)', opacity: 0.5,
      }}/>
      {/* star dust */}
      <svg style={{ position: 'fixed', inset: 0, zIndex: -1, pointerEvents: 'none', opacity: 0.5 }}>
        {Array.from({ length: 60 }).map((_, i) => {
          const x = (i * 97 + 13) % 100;
          const y = (i * 53 + 29) % 100;
          const r = 0.5 + ((i * 17) % 10) / 10;
          return <circle key={i} cx={`${x}%`} cy={`${y}%`} r={r} fill="white" opacity={0.35 + (i % 5) * 0.1}/>;
        })}
      </svg>

      {/* Top nav */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        marginBottom: 28, maxWidth: 1440, margin: '0 auto 28px',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 11,
            background: 'conic-gradient(from 120deg, oklch(0.72 0.2 220), oklch(0.72 0.22 300), oklch(0.78 0.18 340), oklch(0.72 0.2 220))',
            boxShadow: '0 8px 20px -4px rgba(180,120,255,0.5), 0 1px 0 rgba(255,255,255,0.45) inset',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{ width: 16, height: 16, borderRadius: 5, background: 'rgba(11,6,32,0.6)', backdropFilter: 'blur(4px)' }}/>
          </div>
          <div>
            <div style={{ fontSize: 16, fontWeight: 600, letterSpacing: -0.3 }}>Luxar Vault</div>
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1.4, color: 'rgba(255,255,255,0.5)' }}>AI-NATIVE WALLET · v4.2</div>
          </div>
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: 'Space Grotesk, sans-serif' }}>
          {['Portfolio', 'Swap', 'Stake', 'History'].map((t, i) => (
            <div key={t} style={{
              padding: '8px 14px', borderRadius: 10, cursor: 'pointer', fontSize: 13,
              color: i === 0 ? '#fff' : 'rgba(255,255,255,0.55)',
              background: i === 0 ? 'rgba(255,255,255,0.08)' : 'transparent',
              border: i === 0 ? '1px solid rgba(255,255,255,0.12)' : '1px solid transparent',
            }}>
              {t}
            </div>
          ))}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            padding: '7px 12px', borderRadius: 999,
            background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.12)',
            fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: 'rgba(255,255,255,0.85)',
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'oklch(0.8 0.18 160)', boxShadow: '0 0 10px oklch(0.8 0.18 160)'}}/>
            Hyperloop
          </div>
          <div style={{
            width: 36, height: 36, borderRadius: '50%',
            background: 'conic-gradient(from 45deg, oklch(0.7 0.2 300), oklch(0.75 0.18 200), oklch(0.7 0.2 340))',
            border: '1px solid rgba(255,255,255,0.2)',
          }}/>
        </div>
      </div>

      {/* GRID */}
      <div style={{
        maxWidth: 1440, margin: '0 auto',
        display: 'grid', gridTemplateColumns: '1.7fr 1fr', gap: 24,
      }}>
        {/* LEFT COLUMN */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
          {/* Hero: portfolio + risk */}
          <GlassPanel tilt style={{ padding: 28 }}>
            <PortfolioHeader total={total} delta={+3.48} hidden={hidden} setHidden={setHidden}/>

            <div style={{
              height: 1, background: 'linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent)', margin: '6px 0 20px',
            }}/>

            <RiskSlider value={risk} onChange={setRisk}/>

            <div style={{ display: 'flex', gap: 10, marginTop: 22 }}>
              <HoloButton variant="risk" icon={Icon.bolt}>Auto-rebalance</HoloButton>
              <HoloButton variant="ghost" icon={Icon.send}>Send</HoloButton>
              <HoloButton variant="ghost" icon={Icon.receive}>Receive</HoloButton>
              <div style={{ flex: 1 }}/>
              <HoloButton variant="ghost" icon={Icon.chip}>Connect Ledger</HoloButton>
            </div>
          </GlassPanel>

          {/* Asset list */}
          <GlassPanel style={{ padding: 22 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
              <div style={{ fontFamily: 'Space Grotesk, sans-serif', fontSize: 18, fontWeight: 500 }}>Assets</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {['All', 'Holdings', 'Watch', 'Staked'].map((t, i) => (
                  <div key={t} style={{
                    padding: '4px 10px', borderRadius: 999, fontSize: 11, letterSpacing: 0.5,
                    fontFamily: 'JetBrains Mono, monospace', cursor: 'pointer',
                    background: i === 1 ? 'rgba(255,255,255,0.10)' : 'transparent',
                    border: `1px solid ${i === 1 ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.1)'}`,
                    color: i === 1 ? '#fff' : 'rgba(255,255,255,0.6)',
                  }}>{t.toUpperCase()}</div>
                ))}
              </div>
            </div>
            <AssetList query={query} setQuery={setQuery}/>
          </GlassPanel>

          {/* Activity */}
          <GlassPanel style={{ padding: 22 }}>
            <ActivityFeed/>
          </GlassPanel>
        </div>

        {/* RIGHT COLUMN */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
          <GlassPanel style={{ padding: 22 }}>
            <SmartSwap risk={risk}/>
          </GlassPanel>

          <GlassPanel style={{ padding: 22 }}>
            <AIInsights/>
          </GlassPanel>
        </div>
      </div>

      <TweaksPanel risk={risk} setRisk={setRisk}/>
    </div>
  );
}

// ---- Tweaks panel ---------------------------------------------------------
function TweaksPanel({ risk, setRisk }) {
  const [on, setOn] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  if (!on) return null;

  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, zIndex: 50,
      width: 260, padding: 16, borderRadius: 16,
      background: 'rgba(22,14,42,0.85)', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
      border: '1px solid rgba(255,255,255,0.16)',
      boxShadow: '0 30px 60px -10px rgba(0,0,0,0.7)',
      color: '#fff', fontFamily: 'Space Grotesk, sans-serif',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
        <div style={{ fontSize: 13, fontWeight: 500, letterSpacing: 0.3 }}>Tweaks</div>
        <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: 'rgba(255,255,255,0.5)' }}>LIVE</div>
      </div>
      <div style={{ fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'rgba(255,255,255,0.6)', marginBottom: 6, letterSpacing: 1.2 }}>
        RISK EXPOSURE · {(risk * 100).toFixed(0)}%
      </div>
      <input type="range" min="0" max="1" step="0.01" value={risk}
        onChange={e => setRisk(parseFloat(e.target.value))}
        style={{ width: '100%' }}/>
      <div style={{ marginTop: 12, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
        {[
          { k: 'SAFE', v: 0.1 }, { k: 'BALANCED', v: 0.45 },
          { k: 'AGGRO', v: 0.75 }, { k: 'DEGEN', v: 0.98 },
        ].map(p => (
          <button key={p.k} onClick={() => setRisk(p.v)} style={{
            padding: '6px 8px', borderRadius: 8,
            background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.12)',
            color: '#fff', fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: 1, cursor: 'pointer',
          }}>{p.k}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WalletShell/>);

</script>
