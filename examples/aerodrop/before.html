<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Delivery App</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #e2e8f0;
  }
  .phone-frame {
    width: 390px;
    background: #1e293b;
    border-radius: 44px;
    border: 2px solid #334155;
    box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
    position: relative;
  }
  .status-bar {
    background: #0f172a;
    padding: 12px 24px 8px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 34px;
    background: #000;
    border-radius: 0 0 18px 18px;
  }
  .header {
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title { font-size: 20px; font-weight: 800; }
  .header-title span { color: #3b82f6; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 14px; }

  .map-area {
    background: linear-gradient(180deg, #1e3a5f 0%, #0f2540 100%);
    height: 220px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .map-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .route-line {
    position: absolute;
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    top: 50%;
    left: 20%;
    border-radius: 2px;
    box-shadow: 0 0 8px #3b82f6;
  }
  .drone-marker {
    position: absolute;
    top: 45%; left: 55%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    filter: drop-shadow(0 0 12px #3b82f6);
  }
  .origin-dot { position: absolute; top: 48%; left: 20%; width: 12px; height: 12px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
  .dest-dot { position: absolute; top: 48%; right: 20%; width: 12px; height: 12px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 8px #ef4444; }
  .eta-badge {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(30,41,59,0.9);
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }
  .eta-badge .time { color: #3b82f6; }

  .content { background: #1e293b; padding: 16px 20px; }

  .delivery-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .delivery-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .delivery-id { font-size: 11px; color: #64748b; font-family: monospace; }
  .status-badge { background: rgba(34,197,94,0.15); color: #22c55e; border-radius: 12px; padding: 3px 10px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
  .package-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .package-addr { font-size: 12px; color: #64748b; }
  .progress-bar { height: 3px; background: #334155; border-radius: 2px; margin-top: 12px; }
  .progress-fill { height: 100%; width: 65%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 2px; }

  .agent-section { margin-top: 4px; }
  .section-label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .agent-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .agent-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #1e3a5f, #3b82f6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .agent-name { font-size: 13px; font-weight: 600; }
  .agent-status { font-size: 11px; color: #22c55e; }
  .agent-phase { font-size: 10px; color: #64748b; font-family: monospace; margin-top: 2px; }

  .bottom-bar {
    background: #0f172a;
    padding: 12px 20px 24px;
    display: flex;
    justify-content: space-around;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #64748b; }
  .nav-item.active { color: #3b82f6; }
  .nav-icon { font-size: 20px; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="notch"></div>
  <div class="status-bar">
    <span>9:41</span>
    <span style="letter-spacing:2px">▉▉▉▉</span>
  </div>

  <div class="header">
    <div class="header-title">Aero<span>Drop</span></div>
    <div class="avatar">👤</div>
  </div>

  <div class="map-area">
    <div class="map-grid"></div>
    <div class="route-line"></div>
    <div class="origin-dot"></div>
    <div class="dest-dot"></div>
    <div class="drone-marker">🚁</div>
    <div class="eta-badge">ETA <span class="time">4 min</span> · 1.2 km remaining</div>
  </div>

  <div class="content">
    <div class="delivery-card">
      <div class="delivery-header">
        <div class="delivery-id">#AD-20480291</div>
        <div class="status-badge"><div class="status-dot"></div> In Transit</div>
      </div>
      <div class="package-name">📦 Neural Keyboard 75</div>
      <div class="package-addr">→ 42 Meridian Drive, Suite 8</div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="agent-section">
      <div class="section-label">AI Agent Status</div>
      <div class="agent-card">
        <div class="agent-icon">🤖</div>
        <div>
          <div class="agent-name">Atlas-7 Pathfinder</div>
          <div class="agent-status">● ACTIVE</div>
          <div class="agent-phase">PHASE: COORDINATING</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="nav-item active"><div class="nav-icon">🏠</div>Home</div>
    <div class="nav-item"><div class="nav-icon">📍</div>Track</div>
    <div class="nav-item"><div class="nav-icon">📦</div>Orders</div>
    <div class="nav-item"><div class="nav-icon">⚙️</div>Settings</div>
  </div>
</div>
</body>
</html>
